# ============================================================
# render.yaml — Render Deployment Configuration
# Docs: https://render.com/docs/render-yaml-spec
# ============================================================
services:
  - type: web
    name: stadiumind-ai-backend
    runtime: python
    region: oregon
    plan: starter

    # Run from the backend subfolder
    rootDir: backend

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --log-level info

    healthCheckPath: /health

    envVars:
      - key: GEMINI_API_KEY
        sync: false        # Set this manually in the Render dashboard — never hardcode

      - key: HOST
        value: 0.0.0.0

      - key: CORS_ORIGINS
        value: "*"         # Replace with your Vercel URL after first deploy

      - key: PYTHON_VERSION
        value: "3.11.9"

    autoDeploy: true       # Auto re-deploy on every git push to main branch
